name: Release

# Builds standalone tuiui binaries and attaches them to the GitHub Release for a
# pushed tag (e.g. v0.1.0), so users can install with the curl | sh installer
# without a Rust toolchain.

on:
  push:
    tags: ["v*"]
  # Manual runs create the tag + release themselves (used by environments that
  # can build PRs but cannot push tags). The version must match Cargo.toml.
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Both macOS targets build on the Apple-Silicon runner: it has the
          # x86_64 SDK, so it cross-compiles the Intel binary without depending
          # on the heavily-backlogged macos-13 (Intel) runner.
          - { os: macos-14, target: aarch64-apple-darwin }
          - { os: macos-14, target: x86_64-apple-darwin }
          - { os: ubuntu-22.04, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-22.04-arm, target: aarch64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, extra_features: "--features wayland-compositor" }
    steps:
      - uses: actions/checkout@v4

      - name: Install Wayland deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev libdrm-dev libgbm-dev

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} ${{ matrix.extra_features }}

      - name: Package
        run: |
          mkdir -p release-assets
          cp assets/tuiui.desktop release-assets/
          cp assets/tuiui-compositor.service release-assets/
          cp assets/drm-uaccess.rules release-assets/
          # Linux builds include both binaries; other platforms just tuiui
          # Only include tuiui-compositor if it exists (built only with wayland-compositor feature)
          if [ "${{ runner.os }}" = "Linux" ]; then
            tar -czf tuiui-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release tuiui $(test -f target/${{ matrix.target }}/release/tuiui-compositor && echo "tuiui-compositor") -C release-assets .
          else
            tar -czf tuiui-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release tuiui -C release-assets .
          fi

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          # On dispatch this creates the tag (at the run's commit) and the
          # release; on a tag push it attaches to the existing tag's release.
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          body: "See CHANGELOG.md for the full release notes."
          files: tuiui-${{ matrix.target }}.tar.gz
